<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wumpus KB Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --b0:  #f0f8ff;
  --b1:  #dff0fb;
  --b2:  #c8e6f7;
  --b3:  #aed8f0;
  --b4:  #88c4e8;
  --b5:  #5aaad8;
  --b6:  #3a8ec0;
  --b7:  #2070a8;
  --text:  #0a2840;
  --text2: #1e5070;
  --text3: #3a78a0;
  --muted: #6a9aba;
  --faint: #9ac0d8;
  --gold:  #9a6010;
  --gold2: #c08020;
  --teal:  #1a7860;
  --danger:#a02020;
  --safe:  #1a6838;
  --border: rgba(58,142,192,0.35);
  --border2:rgba(58,142,192,0.18);
  --cell: 108px;
  --gap:  5px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--b1);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

header {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px; height: 58px;
  background: var(--b6);
  border-bottom: 2px solid var(--b5);
}
.logo-emblem { width: 34px; height: 34px; flex-shrink:0; }
.logo-emblem svg { width:100%; height:100%; }
.logo-title {
  font-family: 'Cinzel', serif;
  font-size: 22px; font-weight: 700;
  color: #fff; letter-spacing: 1.5px;
}
.hdr-right { margin-left: auto; }
.status-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 16px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; color: #fff; font-weight: 600;
}
.status-dot { width:8px; height:8px; border-radius:50%; background:#fff; animation:pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }


.layout {
  flex: 1;
  display: grid;
  grid-template-columns: 290px 1fr 330px;
  min-height: 0;
}

.side {
  display: flex; flex-direction: column;
  gap: 16px; padding: 20px 18px;
  overflow-y: auto;
  background: var(--b0);
}
.side-left  { border-right: 2px solid var(--border); }
.side-right { border-left:  2px solid var(--border); }

.slabel {
  font-family: 'Cinzel', serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 2.5px; color: var(--b6);
  text-transform: uppercase;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.sep { height: 1.5px; background: var(--border2); flex-shrink:0; }

.ctrl { display: flex; align-items: center; gap: 12px; }
.ctrl label { font-size: 18px; color: var(--text2); min-width: 44px; }
input[type=number] {
  width: 76px; padding: 8px 12px;
  border: 2px solid var(--border);
  border-radius: 6px;
  font-size: 18px; color: var(--text);
  background: var(--b1);
  font-family: 'JetBrains Mono', monospace;
  transition: border-color 0.18s;
}
input[type=number]:focus { outline:none; border-color: var(--b6); }


.btn {
  padding: 12px 16px; border-radius: 6px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  border: 2px solid transparent;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.5px;
}
.btn:disabled { opacity:0.28; cursor:not-allowed; }
.btn-primary { background: var(--b6); color:#fff; border-color: var(--b7); }
.btn-primary:hover:not(:disabled) { background: var(--b7); }
.btn-teal {
  background: rgba(26,120,96,0.1); color: var(--teal);
  border-color: rgba(26,120,96,0.4);
}
.btn-teal:hover:not(:disabled) { background: rgba(26,120,96,0.2); }
.btn-amber {
  background: rgba(154,96,16,0.1); color: var(--gold);
  border-color: rgba(154,96,16,0.4);
}
.btn-amber:hover:not(:disabled) { background: rgba(154,96,16,0.2); }
.btn-row { display:flex; gap:10px; }

.badge-row { display:flex; flex-wrap:wrap; gap:6px; min-height:34px; }
.badge {
  padding: 5px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; border-radius: 4px; border: 2px solid;
  font-weight: 600;
}
.badge-breeze  { border-color:rgba(40,140,200,0.6); color:#1060a0; background:rgba(40,140,200,0.1); }
.badge-stench  { border-color:rgba(140,80,200,0.5); color:#6030a0; background:rgba(140,80,200,0.08); }
.badge-glitter { border-color:rgba(160,110,20,0.6); color:var(--gold); background:rgba(160,110,20,0.1); }


.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.metric {
  background: var(--b1); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 15px;
}
.metric-val { font-family:'Cinzel',serif; font-size:36px; font-weight:700; line-height:1; }
.metric-lbl {
  font-size: 11px; letter-spacing:1.5px; color:var(--muted);
  margin-top:6px; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
}

.log-box {
  background: var(--b1); border: 2px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  font-size: 13px; line-height: 2;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
}
.entry { border-bottom:1px solid var(--border2); padding:1px 0; }
.tell  { color:#1060b0; }
.ask   { color:#8a4e00; }
.infer { color:#1a6848; }
.warn  { color:#b02020; }

.legend { display:grid; grid-template-columns:1fr 1fr; gap:7px 8px; }
.leg { display:flex; align-items:center; gap:8px; font-size:15px; color:var(--text2); }
.leg-dot { width:17px; height:17px; border-radius:5px; flex-shrink:0; border:2px solid; }


.center {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 14px 10px;
  overflow: hidden;
  background: var(--b2);
}

.grid-outer {
  background: var(--b0);
  border: 2px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(10,60,120,0.10);
  overflow: hidden;
  width: 100%;
}
.grid-titlebar {
  display: flex; align-items: center; justify-content: center;
  padding: 14px 22px;
  background: var(--b5);
  border-bottom: 2px solid var(--b4);
}
.grid-title {
  font-family: 'Cinzel', serif;
  font-size: 20px; font-weight: 700;
  color: #fff; letter-spacing: 2px;
}
.grid-body { padding: 18px 18px 20px; display:flex; flex-direction:column; align-items:center; }

.col-labels { display:flex; padding-left:32px; margin-bottom:6px; }
.col-label { width:var(--cell); text-align:center; font-size:12px; font-weight:700; color:var(--muted); font-family:'JetBrains Mono',monospace; letter-spacing:1px; }
.grid-rows { display:flex; flex-direction:column; gap:var(--gap); }
.grid-row  { display:flex; align-items:center; gap:var(--gap); }
.row-label { width:26px; text-align:center; font-size:12px; font-weight:700; color:var(--muted); flex-shrink:0; font-family:'JetBrains Mono',monospace; }

.cell {
  width:var(--cell); height:var(--cell);
  border: 2px solid var(--border2);
  border-radius: 10px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; user-select:none;
  transition: all 0.25s;
}
.cell-coord { position:absolute; top:5px; left:7px; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--faint); }
.cell-state { position:absolute; bottom:5px; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; }
.cell-icon    { font-size:30px; line-height:1; margin-top:2px; }
.cell-percept { font-size:14px; line-height:1; margin-top:3px; opacity:0.85; }

.c-unknown  { background:var(--b1); border-color:var(--border2); }
.c-unknown  .cell-state { color:var(--faint); }
.c-visited  { background:var(--b2); border-color:var(--border); }
.c-visited  .cell-state { color:var(--muted); }
.c-safe     { background:rgba(26,104,56,0.10); border-color:rgba(26,104,56,0.38); }
.c-safe     .cell-state { color:var(--safe); }
.c-agent    { background:rgba(154,96,16,0.14); border-color:#c08020; box-shadow:0 0 0 3px rgba(192,128,32,0.18); }
.c-agent    .cell-state { color:var(--gold); }
.c-danger   { background:rgba(160,32,32,0.09); border-color:rgba(160,32,32,0.40); }
.c-danger   .cell-state { color:var(--danger); }
.c-frontier { background:var(--b3); border-color:var(--b5); animation:frontAnim 2.5s ease-in-out infinite; }
.c-frontier .cell-state { color:var(--b6); }

@keyframes frontAnim {
  0%,100%{border-color:var(--b4);background:var(--b3);box-shadow:none;}
  50%{border-color:var(--b6);background:var(--b2);box-shadow:0 0 0 3px rgba(58,142,192,0.18);}
}

#overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(10,40,80,0.72);
  backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#overlay.show { display:flex; }
.ov-box {
  background:var(--b0); border:2px solid var(--border);
  border-radius:16px; padding:56px 68px; text-align:center;
  box-shadow:0 20px 60px rgba(10,40,100,0.22);
  max-width:460px; width:90%;
}
.ov-box.dead { border-color:rgba(160,32,32,0.5); }
.ov-title { font-family:'Cinzel',serif; font-size:34px; font-weight:700; color:var(--b7); margin-bottom:14px; }
.ov-box.dead .ov-title { color:var(--danger); }
.ov-sub { font-size:18px; color:var(--text2); margin-bottom:36px; line-height:1.7; font-style:italic; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--b3); border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="logo-emblem">
    <svg viewBox="0 0 32 32" fill="none">
      <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" fill="rgba(255,255,255,0.12)"/>
      <circle cx="16" cy="16" r="5" fill="rgba(255,255,255,0.9)"/>
      <circle cx="16" cy="16" r="2.2" fill="rgba(58,142,192,0.8)"/>
    </svg>
  </div>
  <div class="logo-title">Wumpus KB Agent</div>
  <div class="hdr-right">
    <div class="status-pill">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="side side-left">
    <div class="slabel">Dungeon Setup</div>
    <div class="ctrl"><label>Rows</label><input type="number" id="inp-rows" value="4" min="3" max="8"></div>
    <div class="ctrl"><label>Cols</label><input type="number" id="inp-cols" value="4" min="3" max="8"></div>
    <div class="ctrl"><label>Pits</label><input type="number" id="inp-pits" value="3" min="1" max="12"></div>
    <button class="btn btn-primary" id="btn-new" style="width:100%;margin-top:4px;">▶  New Episode</button>

    <div class="sep"></div>
    <div class="slabel">Percepts</div>
    <div class="badge-row" id="percept-row"></div>

    <div class="sep"></div>
    <div class="slabel">Agent Control</div>
    <div class="btn-row">
      <button class="btn btn-teal" id="btn-step" disabled style="flex:1;font-size:17px;">Step →</button>
      <button class="btn btn-amber" id="btn-auto" disabled style="flex:1;font-size:17px;">Auto ▶</button>
    </div>

    <div class="sep"></div>
    <div class="slabel">Legend</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:rgba(154,96,16,0.14);border-color:#c08020;"></div>Agent</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(26,104,56,0.10);border-color:rgba(26,104,56,0.38);"></div>Safe</div>
      <div class="leg"><div class="leg-dot" style="background:var(--b3);border-color:var(--b5);"></div>Frontier</div>
      <div class="leg"><div class="leg-dot" style="background:var(--b2);border-color:var(--border);"></div>Visited</div>
      <div class="leg"><div class="leg-dot" style="background:var(--b1);border-color:var(--border2);"></div>Unknown</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(160,32,32,0.09);border-color:rgba(160,32,32,0.4);"></div>Hazard</div>
    </div>
    <div style="font-size:16px;color:var(--text2);line-height:2.6;margin-top:6px;">
      🤖 Agent &nbsp;🕳 Pit &nbsp;👹 Wumpus &nbsp;💛 Gold<br>
      🌬 Breeze &nbsp;💨 Stench &nbsp;✓ KB-proven safe
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="grid-outer">
      <div class="grid-titlebar">
        <div class="grid-title">🗺 &nbsp; Cave of Wumpus</div>
      </div>
      <div class="grid-body">
        <div class="col-labels" id="col-labels"></div>
        <div class="grid-rows"  id="grid-rows"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="side side-right">
    <div class="slabel">Mission Metrics</div>
    <div class="metrics-grid">
      <div class="metric"><div class="metric-val" style="color:var(--b6)" id="met-infer">0</div><div class="metric-lbl">Inferences</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--teal)" id="met-moves">0</div><div class="metric-lbl">Moves</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--safe)" id="met-safe">0</div><div class="metric-lbl">Safe Cells</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--gold)" id="met-kb">0</div><div class="metric-lbl">KB Clauses</div></div>
    </div>

    <div class="sep"></div>
    <div class="slabel">Inference Log</div>
    <div class="log-box" id="log-box" style="max-height:210px;"></div>

    <div class="sep"></div>
    <div class="slabel">CNF Clause Store</div>
    <div class="log-box" id="cnf-box" style="max-height:150px;font-size:11px;color:var(--muted);"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="ov-box" id="ov-box">
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-sub"   id="ov-sub"></div>
    <button class="btn btn-primary" id="btn-ov-new" style="padding:13px 36px;font-size:16px;">▶  New Episode</button>
  </div>
</div>

<script>

let autoTimer = null;
let gameOver  = false;
let stepping  = false;   

const $ = id => document.getElementById(id);

async function api(path, body = null) {
  const opts = body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : { method: 'GET' };
  return (await fetch(path, opts)).json();
}

function isFrontier(cell, visitedSet) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  return dirs.some(([dr, dc]) => visitedSet.has(`${cell.r+dr},${cell.c+dc}`));
}

function cellCls(cell, visitedSet) {
  if (cell.is_agent) return 'c-agent';
  if (cell.confirmed_pit || cell.confirmed_wumpus || cell.has_pit || cell.has_wumpus) return 'c-danger';
  if (cell.visited) return 'c-visited';
  if (cell.safe) return 'c-safe';
  if (isFrontier(cell, visitedSet)) return 'c-frontier';
  return 'c-unknown';
}

function cellStateLabel(cls) {
  return { 'c-agent':'Agent', 'c-visited':'Visited', 'c-safe':'Safe',
           'c-frontier':'Frontier', 'c-danger':'Hazard', 'c-unknown':'Unknown' }[cls] || '';
}

function cellIcons(cell) {
  let i = '';
  if (cell.is_agent) i += '🤖';
  if (cell.has_gold && !cell.is_agent) i += '💛';
  if (cell.has_pit) i += '🕳';
  if (cell.has_wumpus) i += '👹';
  if (cell.confirmed_pit  && !cell.has_pit)    i += '🕳';
  if (cell.confirmed_wumpus && !cell.has_wumpus) i += '👹';
  if (!i && cell.safe && !cell.visited) i = '✓';
  return i;
}

function cellPercept(cell) {
  if (!cell.visited || !cell.percepts.length) return '';
  return cell.percepts.map(p => p === 'BREEZE' ? '🌬' : p === 'STENCH' ? '💨' : '✨').join('');
}

function render(state) {
  
  const visitedSet = new Set(state.cells.filter(c => c.visited).map(c => `${c.r},${c.c}`));

  const colLabels = $('col-labels');
  colLabels.innerHTML = '';
  const sp = document.createElement('div');
  sp.style.width = '32px';
  colLabels.appendChild(sp);
  for (let c = 0; c < state.cols; c++) {
    const d = document.createElement('div');
    d.className = 'col-label';
    d.textContent = 'C' + c;
    colLabels.appendChild(d);
  }

  const gridRows = $('grid-rows');
  gridRows.innerHTML = '';
  for (let r = state.rows - 1; r >= 0; r--) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    const rl = document.createElement('div');
    rl.className = 'row-label';
    rl.textContent = 'R' + r;
    row.appendChild(rl);
    for (let c = 0; c < state.cols; c++) {
      const cell = state.cells.find(x => x.r === r && x.c === c);
      const cls = cellCls(cell, visitedSet);
      const d = document.createElement('div');
      d.className = 'cell ' + cls;
      d.innerHTML = `<span class="cell-coord">${r},${c}</span>`
        + `<span class="cell-icon">${cellIcons(cell)}</span>`
        + `<span class="cell-percept">${cellPercept(cell)}</span>`
        + `<span class="cell-state">${cellStateLabel(cls)}</span>`;
      row.appendChild(d);
    }
    gridRows.appendChild(row);
  }

  const perc = state.current_percepts;
  $('percept-row').innerHTML = perc.length
    ? perc.map(p => {
        const icon = p === 'BREEZE' ? '🌬' : p === 'STENCH' ? '💨' : '✨';
        return `<span class="badge badge-${p.toLowerCase()}">${icon} ${p}</span>`;
      }).join('')
    : '';

  $('met-infer').textContent = state.inference_steps;
  $('met-moves').textContent  = state.moves;
  $('met-safe').textContent   = state.safe_count;
  $('met-kb').textContent     = state.kb_clauses;

  const smap = { running:'Running', gold:'Gold Retrieved!', pit:'Fell in Pit', wumpus:'Devoured!', stuck:'Stuck' };
  $('status-text').textContent = smap[state.status] || state.status;

  $('log-box').innerHTML = [...state.log].reverse().slice(0, 60)
    .map(e => `<div class="entry ${e.kind}">${e.msg}</div>`).join('');
  $('cnf-box').textContent = state.cnf_clauses.join('\n') || '(empty)';

  if (state.status !== 'running' && !gameOver) {
    gameOver = true;
    stopAuto();
    showOverlay(state);
  }
}

function showOverlay(state) {
  const m = {
    gold:   ['🏆 Gold Retrieved!', `Mission complete — ${state.moves} moves · ${state.inference_steps} inferences.`, ''],
    pit:    ['💀 Fell Into a Pit',  'The agent found no guaranteed safe path.', 'dead'],
    wumpus: ['💀 Devoured by Wumpus','The Wumpus was not detected in time.', 'dead'],
    stuck:  ['⚠ Agent Trapped',    'No reachable safe cells remain.', 'dead']
  };
  const [title, sub, cls] = m[state.status] || ['Done', '', ''];
  $('ov-title').textContent = title;
  $('ov-sub').textContent   = sub;
  $('ov-box').className     = 'ov-box ' + cls;
  $('overlay').classList.add('show');
}


let starting = false;
async function newGame() {
  if (starting) return;
  starting = true;
  stopAuto();
  gameOver = false;
  stepping = false;
  $('overlay').classList.remove('show');
  $('btn-step').disabled = false;
  $('btn-auto').disabled = false;
  const rows = +$('inp-rows').value || 4;
  const cols = +$('inp-cols').value || 4;
  const pits = +$('inp-pits').value || 3;
  try {
    render(await api('/api/new', { rows, cols, pits }));
  } finally {
    starting = false;
  }
}

async function step() {
 
  if (gameOver || stepping) return;
  stepping = true;
  try {
    render(await api('/api/step', {}));
  } finally {
    stepping = false;
  }
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  $('btn-auto').textContent = 'Auto ▶';
}

function toggleAuto() {
  if (autoTimer) {
    stopAuto();
  } else {
    $('btn-auto').textContent = 'Pause ⏸';
    autoTimer = setInterval(async () => {
      if (gameOver) { stopAuto(); return; }
      await step(); 
    }, 600);
  }
}

$('btn-new').addEventListener('click', newGame);
$('btn-ov-new').addEventListener('click', newGame);
$('btn-step').addEventListener('click', step);
$('btn-auto').addEventListener('click', toggleAuto);
newGame();
</script>
</body>
</html>
